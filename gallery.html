<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery // PASGABAT</title>
    <link rel="icon" type="image/png" href="psgbt.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 100px; overflow-x: hidden; }
        
        /* --- LOADER --- */
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid transparent; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- NAVBAR TENGAH --- */
        nav { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            padding: 12px 30px; border-radius: 50px; border: 1px solid var(--gold); 
            display: flex; gap: 20px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        nav a:hover { color: var(--gold); }

        h2 { text-align: center; font-family: 'Cinzel'; color: var(--gold); font-size: 2.2rem; margin-bottom: 30px; letter-spacing: 5px; }

        /* --- GRID GALLERY --- */
        .gallery-container { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .frame { 
            background: #fff; 
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            cursor: pointer;
            transition: 0.3s;
        }
        .frame:hover { transform: scale(1.05); border: 2px solid var(--gold); z-index: 10; }

        .frame img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            display: block;
            background: #111;
        }

        /* --- LIGHTBOX (ZOOM FOTO) --- */
        #photoModal {
            display: none;
            position: fixed;
            z-index: 10000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }
        #modalImg {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain; 
            border: 3px solid #fff;
            box-shadow: 0 0 30px var(--gold);
        }
        .close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 50px; cursor: pointer; }

        @media (max-width: 600px) {
            .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .frame img { height: 130px; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="loader-circle"></div></div>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="livechat.html">Live Chat</a>
        <a href="anggota.html">Anggota</a>
    </nav>

    <h2>PASGABAT GALLERY</h2>

    <div class="gallery-container" id="galleryGrid"></div>

    <div id="photoModal" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img id="modalImg" src="">
    </div>

    <script>
        const grid = document.getElementById('galleryGrid');
        const totalFoto = 50;

        for (let i = 1; i <= totalFoto; i++) {
            const frame = document.createElement('div');
            frame.className = 'frame';
            const pathFoto = "img/foto" + i + ".jpg"; 

            frame.innerHTML = `<img src="${pathFoto}" alt="Memori ${i}" onerror="this.parentElement.style.display='none'">`;

            frame.onclick = function() {
                const modal = document.getElementById('photoModal');
                const mImg = document.getElementById('modalImg');
                modal.style.display = 'flex';
                mImg.src = pathFoto;
            };

            grid.appendChild(frame);
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader-wrapper').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-wrapper').style.display = 'none', 500);
            }, 800);
        };
    </script>
</body>
</html>
